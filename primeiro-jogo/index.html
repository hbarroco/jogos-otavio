<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Primeiro Jogo 2D - Aventura de Plataforma</title>
    <link rel="stylesheet" href="src/style.css">
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <h1>🎮 Aventuras do Otávio - Nível 1</h1>
            <div class="game-info">
                <div class="score">Pontos: <span id="score">0</span></div>
                <div class="lives">Vidas: <span id="lives">3</span></div>
            </div>
        </div>
        
        <canvas id="gameCanvas"></canvas>

        <div class="touch-bar">
            <div class="touch-dpad">
                <button class="touch-btn" id="btn-left">&#9664;</button>
                <button class="touch-btn" id="btn-down">&#9660;</button>
                <button class="touch-btn" id="btn-right">&#9654;</button>
            </div>
            <div class="touch-actions">
                <button class="touch-btn" id="btn-dash">DASH</button>
                <button class="touch-btn touch-jump" id="btn-jump">PULAR</button>
            </div>
        </div>

        <div class="controls-info">
            <h3>Controles:</h3>
            <div class="controls-grid">
                <div class="control-item">
                    <kbd>←</kbd> <kbd>→</kbd> Mover
                </div>
                <div class="control-item">
                    <kbd>ESPAÇO</kbd> Pular
                </div>
                <div class="control-item">
                    <kbd>SHIFT</kbd> Dash
                </div>
                <div class="control-item">
                    <kbd>↓</kbd> Agachar
                </div>
                <div class="control-item">
                    <kbd>R</kbd> Reiniciar
                </div>
            </div>
        </div>
        
        <div id="gameOver" class="game-over hidden">
            <h2>Game Over!</h2>
            <p>Pontuação Final: <span id="finalScore">0</span></p>
            <button onclick="restartGame()">Jogar Novamente</button>
        </div>

        <div id="gameWin" class="game-over hidden">
            <h2 style="color: #2ecc71;">Você Venceu!</h2>
            <p>Pontuação Final: <span id="winScore">0</span></p>
            <button onclick="restartGame()">Jogar Novamente</button>
        </div>
    </div>
    
    <script src="src/game.js"></script>
</body>
</html>
